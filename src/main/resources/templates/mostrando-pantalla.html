<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Microconsumidor</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .metrics {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            flex: 1;
            background: #2c5364;
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .card h2 {
            margin: 0;
            font-size: 18px;
        }

        .card h1 {
            margin: 10px 0 0 0;
            font-size: 32px;
        }

        .actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #203a43;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0f2027;
        }

        input {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            width: 100%;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            background: #2c5364;
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background: #f2f2f2;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>Dashboard Microservicio Consumidor</h1>

    <div class="metrics">
        <div class="card">
            <h2>Total Clientes</h2>
            <h1 id="totalClientes">-</h1>
        </div>
        <div class="card">
            <h2>Edad Promedio</h2>
            <h1 id="edadPromedio">-</h1>
        </div>
    </div>

    <div class="actions">
        <button onclick="cargarTotal()">Actualizar Total</button>
        <button onclick="cargarPromedio()">Actualizar Promedio</button>
        <button onclick="mayores18()">Mayores de 18</button>
        <button onclick="mayores30()">Mayores de 30</button>
    </div>

    <div>
        <input type="text" id="ciudadInput" placeholder="Buscar por ciudad...">
        <button onclick="buscarCiudad()">Buscar</button>
    </div>

    <div id="tablaClientes"></div>

</div>

<script>

    const baseUrl = "/microconsumidor/consumiendo-cliente";

    function cargarTotal() {
        fetch(baseUrl + "/total")
            .then(res => res.json())
            .then(data => {
                document.getElementById("totalClientes").innerText = data;
            });
    }

    function cargarPromedio() {
        fetch(baseUrl + "/edad-promedio")
            .then(res => res.json())
            .then(data => {
                document.getElementById("edadPromedio").innerText = data.toFixed(2) + " años";
            });
    }

    function generarTabla(clientes) {

        if(clientes.length === 0){
            document.getElementById("tablaClientes").innerHTML = "<p>No hay resultados.</p>";
            return;
        }

        let html = "<table>";
        html += "<tr><th>Nombre</th><th>Ciudad</th><th>Edad</th><th>Email</th></tr>";

        clientes.forEach(c => {
            html += "<tr>";
            html += "<td>" + c.nombre + "</td>";
            html += "<td>" + c.ciudad + "</td>";
            html += "<td>" + c.edad + "</td>";
            html += "<td>" + c.email + "</td>";
            html += "</tr>";
        });

        html += "</table>";

        document.getElementById("tablaClientes").innerHTML = html;
    }

    function mayores18() {
        fetch(baseUrl + "/mayores-18")
            .then(res => res.json())
            .then(data => generarTabla(data));
    }

    function mayores30() {
        fetch(baseUrl + "/mayores-30")
            .then(res => res.json())
            .then(data => generarTabla(data));
    }

    function buscarCiudad() {
        const ciudad = document.getElementById("ciudadInput").value;
        fetch(baseUrl + "/ciudad/" + ciudad)
            .then(res => res.json())
            .then(data => generarTabla(data));
    }

</script>

</body>
</html>
