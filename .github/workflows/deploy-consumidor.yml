name: Deploy Consumidor to AKS

on:
  push:
    branches:
      - consumidor-cliente   # usa la rama donde trabajas este microservicio

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      # 1️⃣ Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Configurar Java
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # 3️⃣ Compilar proyecto
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 4️⃣ Login en Azure
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 5️⃣ Login en ACR
      - name: Login to ACR
        run: |
          az acr login --name acrclientes --expose-token --output tsv --query accessToken | \
          docker login acrclientes.azurecr.io \
            --username 00000000-0000-0000-0000-000000000000 \
            --password-stdin



      # 6️⃣ Build imagen
      - name: Build Docker image
        run: |
          docker build -t acrclientes.azurecr.io/cliente-consumidor:latest .

      # 7️⃣ Push imagen a ACR
      - name: Push Docker image
        run: |
          docker push acrclientes.azurecr.io/cliente-consumidor:latest

      # 8️⃣ Conectar con AKS
      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.AZURE_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AZURE_CLUSTER_NAME }}

      # 9️⃣ Deploy en Kubernetes
      - name: Deploy to AKS
        run: |
          kubectl apply -f k8s/
